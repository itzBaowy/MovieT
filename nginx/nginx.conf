worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    
    upstream auth_service {
        server moviet-auth-service:8080;
    }

    upstream movie_service {
        server moviet-movie-service:8081;
    }

    server {
        listen 80;

        # Proxy cho Auth Service
        location /api/auth {
            proxy_pass http://auth_service/api/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy cho Movie Service
        location /api/movies {
            proxy_pass http://movie_service/api/movies;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tùy chọn: Route mặc định
        location / {
            return 404;
        }
    }
}
