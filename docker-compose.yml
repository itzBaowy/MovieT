services:
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb

  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    command: npx prisma studio --port 5555 --browser none
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - auth-service

  mongodb:
    image: mongo:4.4
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - moviet_db_data:/data/db

volumes:
  moviet_db_data:
